<!-- Dashboard Content -->
<div class="space-y-6">
  <!-- STATISTIC CARDS -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
  
  <!-- Total Mahasiswa -->
  <div class="group relative overflow-hidden rounded-3xl bg-gradient-to-br from-teal-400 to-teal-600 p-6 shadow-lg hover:shadow-2xl transition-all duration-300 hover:-translate-y-1 min-h-[160px]">
    <!-- Elegant Icon Container -->
    <div class="absolute top-4 right-4">
      <div class="relative">
        <div class="absolute inset-0 bg-white/20 rounded-full blur-xl"></div>
        <div class="relative w-16 h-16 rounded-full bg-white/10 backdrop-blur-sm border border-white/20 flex items-center justify-center group-hover:scale-110 group-hover:rotate-6 transition-all duration-300">
          <span class="material-icons text-white/80 text-3xl drop-shadow-lg">groups</span>
        </div>
      </div>
    </div>
    <div>
      <p class="text-4xl font-bold text-white mb-1" id="totalStudents">0</p>
      <p class="text-teal-50 font-medium text-sm">Mahasiswa Aktif</p>
    </div>
  </div>

  <!-- Negara Asal -->
  <div class="group relative overflow-hidden rounded-3xl bg-gradient-to-br from-pink-500 to-rose-600 p-6 shadow-lg hover:shadow-2xl transition-all duration-300 hover:-translate-y-1 min-h-[160px]">
    <!-- Elegant Icon Container -->
    <div class="absolute top-4 right-4">
      <div class="relative">
        <div class="absolute inset-0 bg-white/20 rounded-full blur-xl"></div>
        <div class="relative w-16 h-16 rounded-full bg-white/10 backdrop-blur-sm border border-white/20 flex items-center justify-center group-hover:scale-110 group-hover:rotate-6 transition-all duration-300">
          <span class="material-icons text-white/80 text-3xl drop-shadow-lg">public</span>
        </div>
      </div>
    </div>
    <div>
      <p class="text-4xl font-bold text-white mb-1" id="totalCountries">0</p>
      <p class="text-pink-50 font-medium text-sm">Negara Asal</p>
    </div>
  </div>

  <!-- Mobilitas Aktif -->
  <div class="group relative overflow-hidden rounded-3xl bg-gradient-to-br from-purple-500 to-indigo-600 p-6 shadow-lg hover:shadow-2xl transition-all duration-300 hover:-translate-y-1 min-h-[160px]">
    <!-- Elegant Icon Container -->
    <div class="absolute top-4 right-4">
      <div class="relative">
        <div class="absolute inset-0 bg-white/20 rounded-full blur-xl"></div>
        <div class="relative w-16 h-16 rounded-full bg-white/10 backdrop-blur-sm border border-white/20 flex items-center justify-center group-hover:scale-110 group-hover:rotate-6 transition-all duration-300">
          <span class="material-icons text-white/80 text-3xl drop-shadow-lg">flight_takeoff</span>
        </div>
      </div>
    </div>
    <div>
      <p class="text-4xl font-bold text-white mb-1" id="activeMobility">0</p>
      <p class="text-purple-50 font-medium text-sm">Mobilitas Aktif</p>
    </div>
  </div>

  <!-- Penerimaan Baru -->
  <div class="group relative overflow-hidden rounded-3xl bg-gradient-to-br from-orange-400 to-amber-600 p-6 shadow-lg hover:shadow-2xl transition-all duration-300 hover:-translate-y-1 min-h-[160px]">
    <!-- Elegant Icon Container -->
    <div class="absolute top-4 right-4">
      <div class="relative">
        <div class="absolute inset-0 bg-white/20 rounded-full blur-xl"></div>
        <div class="relative w-16 h-16 rounded-full bg-white/10 backdrop-blur-sm border border-white/20 flex items-center justify-center group-hover:scale-110 group-hover:rotate-6 transition-all duration-300">
          <span class="material-icons text-white/80 text-3xl drop-shadow-lg">person_add</span>
        </div>
      </div>
    </div>
    <div>
      <p class="text-4xl font-bold text-white mb-1" id="newAdmissions">0</p>
      <p class="text-orange-50 font-medium text-sm">Penerimaan Baru</p>
    </div>
  </div>

</div>

  <!-- Charts Row -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
  <!-- Country Chart -->
  <div class="bg-white rounded-xl shadow p-5">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-semibold text-gray-700 text-lg">📊 Mahasiswa per Negara</h3>
      
    </div>
    <div class="chart-wrapper relative">
      <div id="countryMap" class="w-full"></div>
    </div>
    
  </div>

  <!-- Trend Chart -->
  <div class="bg-white rounded-xl shadow p-5">
    <h3 class="font-semibold text-gray-700 text-lg mb-4">📈 Tren Penerimaan</h3>
    <div class="chart-wrapper relative">
      <canvas id="trendChart"></canvas>
    </div>
  </div>
</div>

  <!-- Recent Activity -->
  <div class="bg-white rounded-xl shadow p-5">
    <h3 class="font-semibold text-gray-700 mb-4">🕐 Aktivitas Terbaru</h3>
    <div id="recentActivity" class="space-y-3">
      <!-- Dynamic content from JS -->
    </div>
  </div>
</div>

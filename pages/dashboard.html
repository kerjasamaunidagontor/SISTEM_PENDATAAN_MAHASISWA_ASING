<!-- Dashboard Content -->
<div class="space-y-6">
  <!-- Stats Cards -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    <div class="bg-white rounded-xl shadow p-5 border-l-4 border-blue-500">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-500">Total Mahasiswa</p>
          <p class="text-2xl font-bold text-gray-800" id="totalStudents">0</p>
        </div>
        <span class="text-3xl">👥</span>
      </div>
    </div>
    <div class="bg-white rounded-xl shadow p-5 border-l-4 border-green-500">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-500">Negara Asal</p>
          <p class="text-2xl font-bold text-gray-800" id="totalCountries">0</p>
        </div>
        <span class="text-3xl">🌍</span>
      </div>
    </div>
    <div class="bg-white rounded-xl shadow p-5 border-l-4 border-purple-500">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-500">Mobilitas Aktif</p>
          <p class="text-2xl font-bold text-gray-800" id="activeMobility">0</p>
        </div>
        <span class="text-3xl">✈️</span>
      </div>
    </div>
    <div class="bg-white rounded-xl shadow p-5 border-l-4 border-orange-500">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-500">Penerimaan Baru</p>
          <p class="text-2xl font-bold text-gray-800" id="newAdmissions">0</p>
        </div>
        <span class="text-3xl">📥</span>
      </div>
    </div>
  </div>

  <!-- Charts Row -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
  <!-- Country Chart -->
  <div class="bg-white rounded-xl shadow p-5">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-semibold text-gray-700 text-lg">📊 Mahasiswa per Negara</h3>
      
    </div>
    <div class="chart-wrapper relative">
      <div id="countryMap" class="w-full"></div>
    </div>
    
  </div>

  <!-- Trend Chart -->
  <div class="bg-white rounded-xl shadow p-5">
    <h3 class="font-semibold text-gray-700 text-lg mb-4">📈 Tren Penerimaan</h3>
    <div class="chart-wrapper relative">
      <canvas id="trendChart"></canvas>
    </div>
  </div>
</div>

  <!-- Recent Activity -->
  <div class="bg-white rounded-xl shadow p-5">
    <h3 class="font-semibold text-gray-700 mb-4">🕐 Aktivitas Terbaru</h3>
    <div id="recentActivity" class="space-y-3">
      <!-- Dynamic content from JS -->
    </div>
  </div>
</div>

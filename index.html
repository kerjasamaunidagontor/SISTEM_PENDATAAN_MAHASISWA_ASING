<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Sistem Pendataan Mahasiswa Asing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

    <!-- jsVectorMap CSS -->
<link
  href="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/css/jsvectormap.min.css"
  rel="stylesheet"
/>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">    

<!-- jsVectorMap Core -->
<script src="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/js/jsvectormap.min.js"></script>

<!-- World Map -->
<script src="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/maps/world.js"></script>

    <!-- FullCalendar -->
    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <!-- untuk import penerimaan -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/img/logo unida.png"
    />
  </head>

  <body class="bg-gray-50 overflow-x-hidden">
    <!-- OVERLAY (MOBILE) -->
    <div
      id="sidebarOverlay"
      onclick="toggleSidebar()"
      class="fixed inset-0 bg-black/40 z-30 hidden md:hidden"
    ></div>

    <!-- SIDEBAR -->
<aside
  id="sidebar"
  class="fixed top-0 left-0 h-screen w-64 bg-slate-900 text-white z-40 overflow-y-auto transform -translate-x-full md:translate-x-0 transition-transform duration-300 shadow-2xl"
>
  <!-- BRAND (Tetap menggunakan konten asli Anda, dengan styling yang lebih elegan) -->
  <a
    href="#"
    onclick="loadPage('dashboard')"
    class="block p-5 border-b border-slate-700/50 hover:bg-slate-800/50 transition duration-300"
  >
    <div class="flex items-center gap-3">
      <img
        src="assets/img/logo unida.png"
        alt="Logo Universitas"
        class="w-10 h-10 object-contain bg-white rounded-full p-1 shadow-sm"
      />
      <div class="leading-tight">
        <div class="font-bold text-lg text-white tracking-wide">INTERNATIONAL</div>
        <p class="text-xs font-medium text-slate-400">Student Data System</p>
      </div>
    </div>
  </a>

  <!-- USER PROFILE -->
  <div class="px-5 py-4 border-b border-slate-700/50">
    <div class="flex items-center gap-3">
      <div class="relative">
        <img
          src="assets/img/iconuser.png"
          alt="avatar"
          class="w-10 h-10 rounded-full border-2 border-slate-600 object-cover"
        />
        <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-slate-900 rounded-full" title="Online"></span>
      </div>
      <div class="leading-tight">
        <p id="sidebarUsername" class="font-semibold text-sm text-white">
          Admin
        </p>
        <span
          id="sidebarRole"
          class="inline-block mt-1 text-[10px] px-2 py-0.5 rounded bg-blue-600/80 text-white font-medium tracking-wide"
        >Administrator</span>
      </div>
    </div>
  </div>

  <!-- NAVIGATION (Menu tetap sama, diganti emoji dengan SVG agar lebih elegan & profesional) -->
  <nav class="p-3 space-y-1 text-sm mt-2">
    <a
      onclick="loadPage('dashboard')"
      class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-all duration-200 cursor-pointer group"
    >
      <svg class="w-5 h-5 text-slate-400 group-hover:text-blue-400 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
      </svg>
      <span>Dashboard</span>
    </a>
    
    <a
      onclick="loadPage('datamahasiswa')"
      class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-all duration-200 cursor-pointer group"
    >
      <svg class="w-5 h-5 text-slate-400 group-hover:text-blue-400 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
      </svg>
      <span>Data Mahasiswa</span>
    </a>
    
    <a
      onclick="loadPage('mobility')"
      class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-all duration-200 cursor-pointer group"
    >
      <svg class="w-5 h-5 text-slate-400 group-hover:text-blue-400 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <span>Mobilitas Internasional</span>
    </a>
    
    <a
      onclick="loadPage('penerimaan')"
      class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-all duration-200 cursor-pointer group"
    >
      <svg class="w-5 h-5 text-slate-400 group-hover:text-blue-400 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
      </svg>
      <span>Data Penerimaan Baru</span>
    </a>
  </nav>

  <!-- LOGOUT SECTION (Dipindah ke bawah agar rapi) -->
  <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-slate-700/50 bg-slate-900">
    <button
      onclick="logout()"
      class="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-red-500/10 text-slate-400 hover:text-red-400 transition-all duration-200 cursor-pointer group"
    >
      <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
      </svg>
      <span class="font-medium">Logout</span>
    </button>
  </div>
</aside>

    <!-- MAIN CONTENT -->
    <main class="md:ml-64 min-h-screen">
      <!-- TOPBAR / HEADER -->
      <header
        class="bg-white/80 backdrop-blur-md shadow-sm px-6 py-3 flex items-center justify-between sticky top-0 z-20 border-b"
      >
        <!-- LEFT -->
        <div class="flex items-center gap-3">
          <button
            onclick="toggleSidebar()"
            class="md:hidden text-blue-700 text-2xl focus:outline-none"
          >
            ☰
          </button>
          <div>
            <h1
              id="page-title"
              class="text-2xl md:text-2xl font-bold text-gray-800 leading-tight"
            >
              Dashboard
            </h1>
            <p class="text-sm text-gray-500">
              Sistem Pendataan Mahasiswa Asing
            </p>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="flex items-center gap-4">
          <div class="relative">
            <button
              onclick="toggleUserMenu()"
              class="flex items-center gap-2 focus:outline-none"
            >
              <img
                src="assets/img/iconuser.png"
                alt="User"
                class="w-8 h-8 rounded-full border"
              />
              <div class="hidden sm:block text-sm text-left">
                <p
                  id="headerUsername"
                  class="font-medium text-gray-700 leading-tight"
                >
                  Admin
                </p>
                <p id="headerRole" class="text-xs text-gray-500 leading-tight">
                  Administrator
                </p>
              </div>
              <span class="text-gray-500">▾</span>
            </button>
            <div
              id="userDropdown"
              class="hidden absolute right-0 mt-2 w-40 bg-white rounded-lg shadow-lg border text-sm z-50"
            >
              <a href="#" class="block px-4 py-2 hover:bg-gray-100"
                >👤 Profile</a
              >
              <button
                onclick="logout()"
                class="w-full text-left px-4 py-2 hover:bg-red-50 text-red-600"
              >
                🚪 Logout
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- DYNAMIC CONTENT -->
      <section id="app-content" class="p-6"></section>
    </main>

    <!-- GLOBAL LOADING -->
    <div
      id="global-loading"
      class="fixed inset-0 bg-black/40 hidden items-center justify-center z-[9999]"
    >
      <div
        class="bg-white rounded-xl px-6 py-5 flex items-center gap-4 shadow-lg"
      >
        <svg
          class="animate-spin h-6 w-6 text-blue-600"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 00-8 8z"
          ></path>
        </svg>
        <span id="global-loading-text" class="text-sm font-medium"
          >Memproses...</span
        >
      </div>
    </div>

    <!-- CORE JS -->

    <script src="assets/js/api.js"></script>
    <script src="assets/js/datamahasiswa.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/dashboard.js"></script>

    <script src="assets/js/mobility.js"></script>
    <script src="assets/js/penerimaan.js"></script>
  </body>
</html>

}

#sidebar .menu-link {
  position: relative;
  transition: all 0.3s ease;
}

#sidebar .menu-link:hover {
  background: rgba(30, 41, 59, 0.8);
  transform: translateX(4px);
}

#sidebar .menu-link.active {
  background: rgba(59, 130, 246, 0.15);
  color: #60a5fa;
  border-left: 3px solid #3b82f6;
}

#sidebar .menu-link.active svg {
  color: #60a5fa;
}

/* Scrollbar Styling */
#sidebar::-webkit-scrollbar {
  width: 6px;
}

#sidebar::-webkit-scrollbar-track {
  background: #0f172a;
}

#sidebar::-webkit-scrollbar-thumb {
  background: #334155;
  border-radius: 3px;
}

#sidebar::-webkit-scrollbar-thumb:hover {
  background: #475569;
}

/* Topbar adjustment */
header {
  background: rgba(248, 250, 252, 0.95);
  backdrop-filter: blur(10px);
}
